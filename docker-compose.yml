version: '3.8'

services:
  postgres:
    container_name: postgres-service
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-db}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata

  retrieval_service:
    container_name: retrieval-service
    restart: always
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-db}
      - MODEL_URL=${MODEL_URL:-https://disk.yandex.ru/d/6U7YaqjrqGDjYQ}
    ports:
      - "80:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres

volumes:
  pgdata: